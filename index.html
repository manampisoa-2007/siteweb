<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENVIRONNEMENT ET LA SANTE</title>

<style>

body{
  					background-size: cover;
     background:wheat;
     margin:10px;
 					 box-shadow: 0px -10px 15px white;
  					overflow: auto;
}

#titr{
    background:green;
    width:100%;
    height:180px;
    position:fixed;
    top:0;
    left:0;
 				 box-shadow: 10px 20px 10px orange;
}

#titre{
    color:white;
    text-align:center;
    font-size:40px;
    animation:couleur 10s infinite;

}

@keyframes couleur{
    25%{color:yellow;}
    50%{color:cyan;}
    75%{color:aqua;}
}
#contenu{
    margin-top:220px;
    animation:apparition 2s;
}

@keyframes apparition{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

button{
    width:95%;
    margin:20px;
    padding:25px;
    font-size:30px;
    border-radius:30px;
    color:white;
    background:green;
    transition:1s;
}

button:hover{
    transform:scale(1.1);
    background:darkgreen;
}

h2{
    text-align:center;
    animation:h2 8s infinite;
}

@keyframes h2{
    25%{color:red;}
    50%{color:blue;}
    75%{color:purple;}
}

</style>
</head>

<body>

<div id="titr">
    <h1 id="titre"></h1>
</div>

<div id="contenu">

<h2>Choisissez une rubrique</h2>

<button onclick="window.location.href='avantages.html'">
 🌿AVANTAGES DE L'ENVIRONNEMENT PROPRE ET STRUCTURÉ
</button>

<button onclick="window.location.href='causes.html'">
🍂CAUSES DE LA DESTRUCTION DE L'ENVIRONNEMENT
</button>

<button onclick="window.location.href='consequences.html'">
⚠️ CONSÉQUENCES DE CES DESTRUCTIONS
</button>

<button onclick="window.location.href='solutions.html'">
💡 SOLUTIONS
</button>

</div>

<script>
  let titre="ENVIRONNEMENT ET LA SANTER";
  let i=0;
  function print(){
    if(i<titre.length){
      document.getElementById("titre").innerHTML+=titre[i];
      i++;
      setTimeout(print,90);
    }
  }
  print();
    
 let y=0;
 setInterval(()=>{
   document.getElementById("titre").style.transform=`rotateY(${y}deg)`;
   y+=2;
 },120);

</script>

</body>
</html>
